<!DOCTYPE html>
<html lang="es" id="html">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla de Multiplicar del 3</title>
  <link rel="stylesheet" href="multiplicar.css">
  <script src="multiplicar.js" defer></script>
</head>

<body>
  <!-- Contenedor principal de la pagina -->
  <main class="page">
    <header class="page-header">
      <!-- Boton solicitado en la parte superior -->
      <button class="test-button" type="button" onclick="generarTabla();">PROBAR</button>

      <div class="title-group" id="titulo">
        <p class="eyebrow"></p>
        <h1 id="table-title"></h1>
      </div>
    </header>

    <!-- Caja numerica con animaciones visuales para insinuar que se debe escribir un numero -->
    <section class="number-zone" aria-labelledby="number-zone-title">
      <h2 id="number-zone-title" class="visually-hidden">Ingrese un numero</h2>

      <div class="number-card">
        <span class="floating-number floating-number-one" aria-hidden="true">7</span>
        <span class="floating-number floating-number-two" aria-hidden="true">3</span>
        <span class="floating-number floating-number-three" aria-hidden="true">9</span>

        <div class="number-input-wrap">
          <input id="numberInput" class="number-input" type="number" min="0" step="1"
            oninput="this.value = this.value.replace(/[^0-9]/g,'');" inputmode="numeric" pattern="[0-9]*"
            autocomplete="off" placeholder="1   2   3" aria-describedby="numberMessage" aria-label="Ingrese un numero">
        </div>

        <p id="numberMessage" class="number-message" aria-live="polite">- ingrese un n&uacute;mero</p>
      </div>
    </section>

    <section class="table-section" aria-labelledby="table-title" id="tabla">

      <table class="multiplication-table">
        <thead id="operacionResultado">

        </thead>
        <tbody id="tablas">

        </tbody>
      </table>
    </section>
  </main>

  <!-- Pie de pagina con creditos y logo -->
  <footer class="page-footer">
    <div class="credit-box">
      <span>© 2026 Carlos Barreto</span>
      <a href="https://wa.me/593987688143?text=Hola%20Carlos,%20quiero%20saber%20más%20de%20tus%20proyectos
" target="_blank"><img src="octopus.png" alt="Logo octopus" class="footer-logo"></a>
    </div>
  </footer>
</body>

</html>
