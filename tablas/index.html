<!DOCTYPE html>
<html lang="es" id="html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla de Multiplicar del 3</title>
  <link rel="stylesheet" href="multiplicar.css">
  <script src="multiplicar.js"></script>
</head>
<body>
  <!-- Contenedor principal de la pagina -->
  <main class="page">
    <header class="page-header">
      <!-- Boton solicitado en la parte superior -->
      <button class="test-button" type="button" onclick="generarTabla();">PROBAR</button>

      <div class="title-group">
        <p class="eyebrow">Matem&aacute;tica b&aacute;sica</p>
        <h1 id="table-title">Tabla de multiplicar del 3</h1>
      </div>
    </header>

    <section class="table-section" aria-labelledby="table-title">
      <!-- Tabla con los resultados de multiplicar el numero 3 -->
      <table class="multiplication-table">
        <thead>
          <tr>
            <th scope="col">Operaci&oacute;n</th>
            <th scope="col">Resultado</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>3 x 1</td>
            <td>3</td>
          </tr>
          <tr>
            <td>3 x 2</td>
            <td>6</td>
          </tr>
          <tr>
            <td>3 x 3</td>
            <td>9</td>
          </tr>
          <tr>
            <td>3 x 4</td>
            <td>12</td>
          </tr>
          <tr>
            <td>3 x 5</td>
            <td>15</td>
          </tr>
          <tr>
            <td>3 x 6</td>
            <td>18</td>
          </tr>
          <tr>
            <td>3 x 7</td>
            <td>21</td>
          </tr>
          <tr>
            <td>3 x 8</td>
            <td>24</td>
          </tr>
          <tr>
            <td>3 x 9</td>
            <td>27</td>
          </tr>
          <tr>
            <td>3 x 10</td>
            <td>30</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <!-- Pie de pagina con creditos y logo -->
  <footer class="page-footer">
    <div class="credit-box">
      <span>Creado por Carlos Barreto</span>
      <img src="octopus.png" alt="Logo octopus" class="footer-logo">
    </div>
  </footer>
</body>
</html>
